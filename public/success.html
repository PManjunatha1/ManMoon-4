<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
  <title>Payment Verification - ManMoon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #F0FDF4; color: #052E16; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px; max-width: 500px; }
    .icon { font-size: 80px; margin-bottom: 20px; animation: bounce 0.6s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    h1 { font-size: 32px; color: #14532D; margin-bottom: 10px; }
    p { font-size: 18px; color: #166534; margin-bottom: 30px; }
    .loader { border: 4px solid #F0FDF4; border-top: 4px solid #14532D; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .message { font-size: 16px; color: #166534; margin-top: 20px; }
    .error { color: #DC2626; }
    .success { color: #16A34A; }
    .btn { margin: 20px auto; padding: 12px 30px; background: #14532D; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn:hover { background: #166534; }
    .btn.hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Verifying Payment...</h1>
    <p id="subtitle">Please wait while we confirm your payment</p>
    <div class="loader" id="loader"></div>
    <div class="message" id="message">Checking with payment gateway...</div>
    <a href="dashboard.html" class="btn hidden" id="successBtn">Go to Dashboard</a>
    <a href="subscribe.html" class="btn hidden" id="retryBtn">Try Again</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('userId');
    const orderId = urlParams.get('orderId');

    const iconEl = document.getElementById('icon');
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const messageEl = document.getElementById('message');
    const loaderEl = document.getElementById('loader');

    function updateUI(icon, title, subtitle, message, cls = '') {
      iconEl.textContent = icon;
      titleEl.textContent = title;
      subtitleEl.textContent = subtitle;
      messageEl.textContent = message;
      messageEl.className = 'message ' + cls;
    }

    async function verifyAndUpdateSubscription() {
      try {
        if (!orderId || !userId) {
          updateUI('❌', 'Invalid Request', 'Missing payment information', 'Redirecting...', 'error');
          loaderEl.style.display = 'none';
          setTimeout(() => window.location.replace('subscribe.html'), 2000);
          return;
        }

        updateUI('⏳', 'Verifying Payment...', 'Please wait', 'Checking with payment gateway...');

        const verifyResponse = await fetch('/api/verify-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId })
        });

        const verifyData = await verifyResponse.json();

        if (!verifyData.isPaid) {
          updateUI('❌', 'Payment Not Completed', 'Your payment was not processed', 'Click below to try again', 'error');
          loaderEl.style.display = 'none';
          document.getElementById('retryBtn').classList.remove('hidden');
          return;
        }

        updateUI('✅', 'Payment Verified!', 'Updating your account...', 'Setting up your subscription...', 'success');

        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
        const { getFirestore, doc, updateDoc } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

        const configResponse = await fetch('/api/get-firebase-config');
        if (!configResponse.ok) throw new Error('Failed to fetch Firebase config');
        const firebaseConfig = await configResponse.json();

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        await updateDoc(doc(db, 'users', userId), {
          subscribed: true,
          paymentStatus: 'paid',
          amountPaid: 152,
          paymentDate: new Date().toISOString(),
          orderId: orderId
        });

        updateUI('✅', 'Payment Successful!', 'Thank you for your purchase', 'Redirecting to your dashboard...', 'success');
        loaderEl.style.display = 'none';
        document.getElementById('successBtn').classList.remove('hidden');
        setTimeout(() => window.location.replace('dashboard.html'), 3000);

      } catch (error) {
        console.error('Error during verification:', error);
        updateUI('❌', 'Error Processing Payment', 'Something went wrong', 'Click below to try again', 'error');
        loaderEl.style.display = 'none';
        document.getElementById('retryBtn').classList.remove('hidden');
      }
    }

    verifyAndUpdateSubscription();
  </script>
</body>
</html>
