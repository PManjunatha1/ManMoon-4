<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
  <title>Payment Successful - ManMoon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #F0FDF4; color: #052E16; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px; }
    .success-icon { font-size: 80px; margin-bottom: 20px; animation: bounce 0.6s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    h1 { font-size: 32px; color: #14532D; margin-bottom: 10px; }
    p { font-size: 18px; color: #166534; margin-bottom: 30px; }
    .loader { border: 4px solid #F0FDF4; border-top: 4px solid #14532D; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .message { font-size: 16px; color: #166534; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for your purchase</p>
    <div class="loader"></div>
    <div class="message">Redirecting to your dashboard...</div>
  </div>

  <script>
    let userId = null;
    let orderId = null;

    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    userId = urlParams.get('userId');
    orderId = urlParams.get('orderId');

    // Initialize Firebase
    import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js").then(({ initializeApp }) => {
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js").then(({ getFirestore, doc, updateDoc }) => {
        const firebaseConfig = {
          apiKey: "AIzaSyCfM85FQhBDmonkh4w57rAfpwNB9afXLdQ",
          authDomain: "manmoon-12.firebaseapp.com",
          projectId: "manmoon-12",
          storageBucket: "manmoon-12.firebasestorage.app",
          messagingSenderId: "484001203292",
          appId: "1:484001203292:web:f136fedfb8cb0b4c3a9299",
          measurementId: "G-6YEJJ98KVM"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Update user subscription status
        if (userId) {
          updateDoc(doc(db, 'users', userId), {
            subscribed: true,
            paymentStatus: 'paid',
            amountPaid: 100,
            paymentDate: new Date().toISOString(),
            orderId: orderId
          }).then(() => {
            console.log('User subscription updated');
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 2000);
          }).catch((error) => {
            console.error('Error updating subscription:', error);
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 2000);
          });
        } else {
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 2000);
        }
      });
    });
  </script>
</body>
</html>
